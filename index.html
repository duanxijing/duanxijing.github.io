<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>开智教育 · 云端教学平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; overflow: hidden; }
        
        /* 登录页面样式 */
        .login-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .login-card {
            background: rgba(255,255,255,0.98); border-radius: 56px; padding: 48px 44px;
            width: 440px; text-align: center; box-shadow: 0 40px 60px -20px rgba(0,0,0,0.3);
        }
        .login-logo { font-size: 72px; margin-bottom: 12px; }
        .login-title { font-size: 32px; font-weight: 800; color: #667eea; margin-bottom: 8px; }
        .login-subtitle { color: #8a9aaa; margin-bottom: 32px; }
        .login-input {
            width: 100%; padding: 14px 20px; margin: 10px 0;
            border: 2px solid #e8e8e8; border-radius: 50px; font-size: 15px;
        }
        .login-btn {
            width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea, #764ba2);
            color: white; border: none; border-radius: 50px; font-size: 16px;
            font-weight: 700; cursor: pointer; margin-top: 24px;
        }
        .login-error { color: #e74c3c; margin-top: 12px; display: none; }
        
        /* 主应用样式 */
        .app-container { display: none; width: 100%; height: 100vh; flex-direction: column; }
        .top-bar {
            background: white; padding: 12px 24px; display: flex;
            justify-content: space-between; align-items: center; box-shadow: 0 2px 12px rgba(0,0,0,0.05);
        }
        .logo-area { font-size: 20px; font-weight: 800; }
        .logo-area span { background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .user-info { display: flex; align-items: center; gap: 18px; position: relative; }
        .avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; color: white; }
        .logout-btn { background: #f0f0f0; border: none; padding: 8px 20px; border-radius: 30px; cursor: pointer; }
        .settings-dropdown {
            position: absolute; top: 55px; right: 0; background: white; border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); width: 200px; display: none; z-index: 100;
        }
        .settings-dropdown.show { display: block; }
        .settings-item { padding: 12px 16px; cursor: pointer; }
        .settings-item:hover { background: #f5f5f5; }
        
        /* 主布局 */
        .main-layout { display: flex; flex: 1; overflow: hidden; }
        .tool-sidebar {
            width: 280px; background: white; border-right: 1px solid #e8ecf1;
            display: flex; flex-direction: column;
        }
        .tool-sidebar-header { padding: 20px; border-bottom: 1px solid #f0f4f9; }
        .tool-sidebar-header h3 { margin-bottom: 12px; }
        .search-box {
            width: 100%; padding: 10px 16px; border: 1px solid #e0e6ed;
            border-radius: 30px; font-size: 14px;
        }
        .tools-list { flex: 1; overflow-y: auto; padding: 12px; }
        .tool-item {
            padding: 12px 16px; margin: 6px 0; background: #f8fafc;
            border-radius: 12px; cursor: pointer; transition: all 0.2s;
        }
        .tool-item:hover { background: #eef2ff; transform: translateX(3px); }
        .tool-item.active { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .content-area { flex: 1; display: flex; flex-direction: column; background: #f8fafc; }
        .tool-header {
            background: white; padding: 12px 24px; border-bottom: 1px solid #eef2f7;
            display: flex; justify-content: space-between;
        }
        .iframe-wrapper { flex: 1; }
        .tool-iframe { width: 100%; height: 100%; border: none; }
        
        /* 管理员面板 */
        .admin-layout { display: flex; flex: 1; overflow: hidden; }
        .admin-sidebar { width: 200px; background: white; border-right: 1px solid #e8ecf1; }
        .admin-menu-item {
            padding: 14px 20px; cursor: pointer; display: flex; align-items: center; gap: 10px;
            border-left: 3px solid transparent;
        }
        .admin-menu-item:hover { background: #f5f7fa; }
        .admin-menu-item.active {
            background: linear-gradient(135deg, #667eea15, #764ba215);
            border-left-color: #667eea; color: #667eea;
        }
        .admin-panel { flex: 1; overflow: auto; padding: 20px; }
        .panel-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .btn {
            padding: 8px 16px; border: none; border-radius: 30px; cursor: pointer;
            font-weight: 500; transition: 0.2s;
        }
        .btn-primary { background: #667eea; color: white; }
        .btn-warning { background: #f5c542; color: #2c3e4e; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-sm { padding: 4px 12px; font-size: 12px; }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th, .data-table td { padding: 10px; text-align: left; border-bottom: 1px solid #f0f0f0; }
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 2000; display: flex;
            align-items: center; justify-content: center; visibility: hidden; opacity: 0;
            transition: 0.2s;
        }
        .modal.show { visibility: visible; opacity: 1; }
        .modal-content {
            background: white; border-radius: 28px; width: 90%; max-width: 550px;
            padding: 28px;
        }
        .modal-input, .modal-textarea {
            width: 100%; padding: 12px; margin: 10px 0;
            border: 1px solid #ddd; border-radius: 16px;
        }
        .modal-textarea { height: 280px; font-family: monospace; }
        .modal-buttons { display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px; }
        .loading-tip { text-align: center; padding: 40px; color: #999; }
    </style>
</head>
<body>
    <!-- 登录页面 -->
    <div class="login-container" id="loginContainer">
        <div class="login-card">
            <div class="login-logo">🎓✨</div>
            <div class="login-title">开智教育</div>
            <div class="login-subtitle">云端教学 · 数据共享</div>
            <input type="text" class="login-input" id="loginUsername" placeholder="📱 手机号 / 账号">
            <input type="password" class="login-input" id="loginPassword" placeholder="🔒 密码">
            <button class="login-btn" id="loginBtn">登 录 平 台</button>
            <div class="login-error" id="loginError">账号或密码错误</div>
        </div>
    </div>

    <!-- 教师端 -->
    <div class="app-container" id="teacherApp">
        <div class="top-bar">
            <div class="logo-area">🎓 开智<span>教育</span></div>
            <div class="user-info">
                <div class="avatar" id="avatarBtn">👤</div>
                <span id="teacherName">教师</span>
                <button class="logout-btn" id="logoutBtn">退出</button>
                <div class="settings-dropdown" id="settingsDropdown">
                    <div class="settings-item" id="editProfileBtn">✏️ 修改个人信息</div>
                    <div class="settings-item" id="changePasswordBtn">🔐 修改密码</div>
                </div>
            </div>
        </div>
        <div class="main-layout">
            <div class="tool-sidebar">
                <div class="tool-sidebar-header">
                    <h3>📚 教学工具</h3>
                    <input type="text" class="search-box" id="searchInput" placeholder="🔍 搜索工具...">
                </div>
                <div class="tools-list" id="toolsList">
                    <div class="loading-tip">加载中...</div>
                </div>
            </div>
            <div class="content-area">
                <div class="tool-header">
                    <div>📖 当前工具：<span id="currentToolName" style="color:#667eea; font-weight:700;">未选择</span></div>
                    <button class="btn btn-sm" id="refreshBtn" style="background:#f0f4f9;">🔄 刷新</button>
                </div>
                <div class="iframe-wrapper">
                    <iframe id="toolIframe" class="tool-iframe" srcdoc=""></iframe>
                </div>
            </div>
        </div>
    </div>

    <!-- 管理员端（类似结构，精简版示意）-->
    <div class="app-container" id="adminApp">
        <div class="top-bar">
            <div class="logo-area">🎓 开智<span>教育管理</span></div>
            <div class="user-info">
                <div class="avatar" id="adminAvatarBtn">👑</div>
                <span id="adminName">管理员</span>
                <button class="logout-btn" id="adminLogoutBtn">退出</button>
            </div>
        </div>
        <div class="admin-layout">
            <div class="admin-sidebar">
                <div class="admin-menu-item active" data-menu="users">👥 用户管理</div>
                <div class="admin-menu-item" data-menu="tools">🧩 工具管理</div>
            </div>
            <div class="admin-panel" id="usersPanel">
                <div class="panel-header">
                    <h3>👥 用户管理</h3>
                    <div><button class="btn btn-primary" id="addUserBtn">➕ 添加用户</button></div>
                </div>
                <div id="usersList">加载中...</div>
            </div>
            <div class="admin-panel" id="toolsPanel" style="display:none;">
                <div class="panel-header">
                    <h3>🧩 工具管理</h3>
                    <button class="btn btn-primary" id="addToolBtn">➕ 添加工具</button>
                </div>
                <div id="toolsManageList">加载中...</div>
            </div>
        </div>
    </div>

    <!-- 模态框 -->
    <div class="modal" id="toolModal">
        <div class="modal-content">
            <h3 id="toolModalTitle">➕ 添加工具</h3>
            <input type="text" id="toolName" class="modal-input" placeholder="工具名称">
            <textarea id="toolHtml" class="modal-textarea" placeholder="粘贴完整的HTML代码..."></textarea>
            <div class="modal-buttons">
                <button class="btn" id="cancelToolModal">取消</button>
                <button class="btn btn-primary" id="confirmToolModal">确认</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== 云端数据交互 ====================
        // 注意：这是一个前端演示代码，实际需要后端API
        // 要真正实现云端共享，您需要部署后端服务
        
        // 方案一：使用 Supabase（推荐）
        // 1. 访问 https://supabase.com 注册免费账号
        // 2. 创建新项目，获取 URL 和 anon key
        // 3. 创建 users 和 tools 两个表
        // 4. 替换下面的配置
        
        const SUPABASE_URL = 'https://YOUR_PROJECT.supabase.co';
        const SUPABASE_KEY = 'YOUR_ANON_KEY';
        
        // 如果还没有部署后端，先使用 localStorage 模拟（单机版）
        // 部署真实后端后，取消下面的注释并注释掉模拟代码
        
        let USE_CLOUD = false; // 改为 true 启用云端同步
        
        // ==================== 模拟本地存储（单机版，仅供测试） ====================
        let users = [];
        let tools = [];
        let currentUser = null;
        
        function initMockData() {
            const savedUsers = localStorage.getItem('edu_users');
            if (savedUsers) {
                users = JSON.parse(savedUsers);
            } else {
                users = [
                    { id: 1, name: '管理员', phone: 'admin', password: 'admin123', role: 'admin', avatar: '👑' },
                    { id: 2, name: '张老师', phone: '13800138000', password: '123456', role: 'teacher', avatar: '👨‍🏫' }
                ];
                saveMockUsers();
            }
            const savedTools = localStorage.getItem('edu_tools');
            if (savedTools) {
                tools = JSON.parse(savedTools);
            } else {
                tools = [
                    { id: 1, name: '📝 欢迎工具', html: '<div style="text-align:center;padding:80px;"><h1>🎉 欢迎使用开智教育</h1><p>管理员可以添加工具</p></div>' }
                ];
                saveMockTools();
            }
        }
        
        function saveMockUsers() { localStorage.setItem('edu_users', JSON.stringify(users)); }
        function saveMockTools() { localStorage.setItem('edu_tools', JSON.stringify(tools)); }
        
        // ==================== 登录逻辑 ====================
        function login(account, password) {
            const user = users.find(u => (u.phone === account || u.name === account) && u.password === password);
            if (user) {
                currentUser = user;
                return true;
            }
            return false;
        }
        
        // ==================== 教师端渲染 ====================
        let currentToolId = null;
        let searchKeyword = '';
        
        function renderToolsList() {
            const container = document.getElementById('toolsList');
            let filtered = tools.filter(t => t.name.toLowerCase().includes(searchKeyword.toLowerCase()));
            if (filtered.length === 0) {
                container.innerHTML = '<div class="loading-tip">✨ 暂无工具</div>';
                return;
            }
            container.innerHTML = '';
            filtered.forEach(tool => {
                const div = document.createElement('div');
                div.className = 'tool-item' + (currentToolId === tool.id ? ' active' : '');
                div.innerHTML = tool.name;
                div.onclick = () => {
                    currentToolId = tool.id;
                    renderToolsList();
                    document.getElementById('currentToolName').innerText = tool.name;
                    document.getElementById('toolIframe').srcdoc = tool.html;
                };
                container.appendChild(div);
            });
        }
        
        function updateTeacherUI() {
            document.getElementById('teacherName').innerText = currentUser.name;
            document.getElementById('avatarBtn').innerHTML = currentUser.avatar || '👤';
            renderToolsList();
            if (tools.length > 0 && !currentToolId) {
                currentToolId = tools[0].id;
                renderToolsList();
                document.getElementById('currentToolName').innerText = tools[0].name;
                document.getElementById('toolIframe').srcdoc = tools[0].html;
            }
        }
        
        // ==================== 管理员端渲染 ====================
        function renderAdminUsers() {
            const container = document.getElementById('usersList');
            if (!container) return;
            let html = '<table class="data-table"><thead><tr><th>姓名</th><th>手机号</th><th>角色</th><th>操作</th></tr></thead><tbody>';
            users.forEach(user => {
                html += `<tr>
                    <td>${user.name}</td>
                    <td>${user.phone}</td>
                    <td>${user.role === 'admin' ? '👑 管理员' : '👨‍🏫 教师'}</td>
                    <td><button class="btn btn-sm btn-danger" onclick="adminDeleteUser(${user.id})">删除</button></td>
                </tr>`;
            });
            html += '</tbody></table>';
            container.innerHTML = html;
        }
        
        function renderAdminTools() {
            const container = document.getElementById('toolsManageList');
            if (!container) return;
            let html = '<table class="data-table"><thead><tr><th>名称</th><th>操作</th></tr></thead><tbody>';
            tools.forEach(tool => {
                html += `<tr>
                    <td>${tool.name}</td>
                    <td><button class="btn btn-sm btn-primary" onclick="adminEditTool(${tool.id})">编辑</button> <button class="btn btn-sm btn-danger" onclick="adminDeleteTool(${tool.id})">删除</button></td>
                </tr>`;
            });
            html += '</tbody></table>';
            container.innerHTML = html;
        }
        
        window.adminDeleteUser = function(id) {
            if (confirm('确定删除吗？')) {
                users = users.filter(u => u.id !== id);
                saveMockUsers();
                renderAdminUsers();
            }
        };
        
        window.adminEditTool = function(id) {
            const tool = tools.find(t => t.id === id);
            if (tool) {
                document.getElementById('toolName').value = tool.name;
                document.getElementById('toolHtml').value = tool.html;
                document.getElementById('toolModal').setAttribute('data-edit-id', id);
                document.getElementById('toolModalTitle').innerText = '✏️ 编辑工具';
                document.getElementById('toolModal').classList.add('show');
            }
        };
        
        window.adminDeleteTool = function(id) {
            if (confirm('确定删除吗？')) {
                tools = tools.filter(t => t.id !== id);
                saveMockTools();
                renderAdminTools();
                renderToolsList();
            }
        };
        
        function addTool(name, html) {
            const newId = tools.length > 0 ? Math.max(...tools.map(t => t.id)) + 1 : 1;
            tools.push({ id: newId, name: name.trim(), html: html });
            saveMockTools();
            renderAdminTools();
            renderToolsList();
        }
        
        function updateTool(id, name, html) {
            const idx = tools.findIndex(t => t.id === id);
            if (idx !== -1) {
                tools[idx].name = name.trim();
                tools[idx].html = html;
                saveMockTools();
                renderAdminTools();
                renderToolsList();
                if (currentToolId === id) {
                    document.getElementById('toolIframe').srcdoc = html;
                }
            }
        }
        
        function addUser(name, phone, password) {
            const newId = users.length > 0 ? Math.max(...users.map(u => u.id)) + 1 : 1;
            users.push({ id: newId, name, phone, password: password || '123456', role: 'teacher', avatar: '👤' });
            saveMockUsers();
            renderAdminUsers();
        }
        
        // 添加用户模态框
        function showAddUserModal() {
            const name = prompt('请输入姓名');
            if (!name) return;
            const phone = prompt('请输入手机号');
            if (!phone) return;
            addUser(name, phone, '123456');
            alert('添加成功，默认密码：123456');
        }
        
        // ==================== 页面切换 ====================
        function showTeacherApp() {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('teacherApp').style.display = 'flex';
            document.getElementById('adminApp').style.display = 'none';
            updateTeacherUI();
        }
        
        function showAdminApp() {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('teacherApp').style.display = 'none';
            document.getElementById('adminApp').style.display = 'flex';
            document.getElementById('adminName').innerText = currentUser.name;
            document.getElementById('adminAvatarBtn').innerHTML = currentUser.avatar || '👑';
            renderAdminUsers();
            renderAdminTools();
        }
        
        function logout() {
            currentUser = null;
            document.getElementById('loginContainer').style.display = 'flex';
            document.getElementById('teacherApp').style.display = 'none';
            document.getElementById('adminApp').style.display = 'none';
        }
        
        // 菜单切换
        function switchAdminMenu(menu) {
            document.getElementById('usersPanel').style.display = menu === 'users' ? 'block' : 'none';
            document.getElementById('toolsPanel').style.display = menu === 'tools' ? 'block' : 'none';
            document.querySelectorAll('.admin-menu-item').forEach(item => {
                item.classList.toggle('active', item.getAttribute('data-menu') === menu);
            });
        }
        
        // ==================== 事件绑定 ====================
        document.getElementById('loginBtn').onclick = () => {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            if (login(username, password)) {
                if (currentUser.role === 'admin') showAdminApp();
                else showTeacherApp();
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        };
        
        document.getElementById('logoutBtn').onclick = logout;
        document.getElementById('adminLogoutBtn').onclick = logout;
        document.getElementById('refreshBtn').onclick = () => {
            if (currentToolId) {
                const tool = tools.find(t => t.id === currentToolId);
                if (tool) document.getElementById('toolIframe').srcdoc = tool.html;
            }
        };
        document.getElementById('searchInput').oninput = (e) => {
            searchKeyword = e.target.value;
            renderToolsList();
        };
        
        // 头像下拉
        document.getElementById('avatarBtn').onclick = (e) => {
            e.stopPropagation();
            document.getElementById('settingsDropdown').classList.toggle('show');
        };
        document.addEventListener('click', () => {
            document.getElementById('settingsDropdown')?.classList.remove('show');
        });
        
        // 修改个人信息（简化版）
        document.getElementById('editProfileBtn').onclick = () => {
            const newName = prompt('请输入新姓名', currentUser.name);
            if (newName) {
                currentUser.name = newName;
                const idx = users.findIndex(u => u.id === currentUser.id);
                if (idx !== -1) users[idx].name = newName;
                saveMockUsers();
                updateTeacherUI();
            }
        };
        
        document.getElementById('changePasswordBtn').onclick = () => {
            const oldPwd = prompt('请输入当前密码');
            if (oldPwd !== currentUser.password) {
                alert('当前密码错误');
                return;
            }
            const newPwd = prompt('请输入新密码');
            if (newPwd) {
                currentUser.password = newPwd;
                const idx = users.findIndex(u => u.id === currentUser.id);
                if (idx !== -1) users[idx].password = newPwd;
                saveMockUsers();
                alert('密码修改成功，请重新登录');
                logout();
            }
        };
        
        // 管理员：用户管理
        document.getElementById('addUserBtn').onclick = showAddUserModal;
        
        // 管理员：工具管理
        document.getElementById('addToolBtn').onclick = () => {
            document.getElementById('toolModal').removeAttribute('data-edit-id');
            document.getElementById('toolModalTitle').innerText = '➕ 添加工具';
            document.getElementById('toolName').value = '';
            document.getElementById('toolHtml').value = '';
            document.getElementById('toolModal').classList.add('show');
        };
        
        document.getElementById('cancelToolModal').onclick = () => {
            document.getElementById('toolModal').classList.remove('show');
        };
        
        document.getElementById('confirmToolModal').onclick = () => {
            const name = document.getElementById('toolName').value;
            const html = document.getElementById('toolHtml').value;
            if (!html.trim()) { alert('请输入HTML代码'); return; }
            const editId = document.getElementById('toolModal').getAttribute('data-edit-id');
            if (editId) {
                updateTool(parseInt(editId), name, html);
            } else {
                addTool(name, html);
            }
            document.getElementById('toolModal').classList.remove('show');
        };
        
        // 管理员菜单切换
        document.querySelectorAll('.admin-menu-item').forEach(item => {
            item.onclick = () => switchAdminMenu(item.getAttribute('data-menu'));
        });
        
        // 初始化
        initMockData();
        document.getElementById('loginContainer').style.display = 'flex';
    </script>
</body>
</html>
