<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>开智教育 · 智慧教学平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow: hidden;
        }

        /* ========== 登录页面 ========== */
        .login-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .login-decoration {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        .decoration-circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
        }
        .circle1 { width: 300px; height: 300px; top: -100px; right: -100px; }
        .circle2 { width: 200px; height: 200px; bottom: 50px; left: -80px; }
        .circle3 { width: 150px; height: 150px; bottom: 150px; right: 100px; }
        .circle4 { width: 100px; height: 100px; top: 200px; left: 100px; }

        .login-card {
            background: rgba(255,255,255,0.98);
            border-radius: 56px;
            padding: 48px 44px;
            width: 440px;
            text-align: center;
            box-shadow: 0 40px 60px -20px rgba(0,0,0,0.3);
            z-index: 10;
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-logo { font-size: 72px; margin-bottom: 12px; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .login-title { font-size: 32px; font-weight: 800; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 8px; }
        .login-subtitle { color: #8a9aaa; margin-bottom: 32px; font-size: 14px; }
        .login-input {
            width: 100%;
            padding: 14px 20px;
            margin: 10px 0;
            border: 2px solid #e8e8e8;
            border-radius: 50px;
            font-size: 15px;
            background: #f8f9fa;
        }
        .login-input:focus { outline: none; border-color: #667eea; background: white; }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 24px;
        }
        .login-footer { margin-top: 24px; color: #aaa; font-size: 12px; }
        .login-error { color: #e74c3c; font-size: 13px; margin-top: 12px; display: none; }

        /* ========== 教师主应用 ========== */
        .teacher-app {
            display: none;
            width: 100%;
            height: 100vh;
            background: #f0f2f8;
            flex-direction: column;
        }

        .top-bar {
            background: white;
            padding: 12px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
        }
        .logo-area { display: flex; align-items: center; gap: 12px; font-size: 20px; font-weight: 800; }
        .logo-area span { background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .user-info { display: flex; align-items: center; gap: 18px; position: relative; }
        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            cursor: pointer;
            color: white;
        }
        .user-name { font-weight: 600; color: #2c3e4e; }
        .logout-btn { background: #f0f0f0; border: none; padding: 8px 20px; border-radius: 30px; cursor: pointer; }
        .settings-dropdown {
            position: absolute;
            top: 60px;
            right: 0;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            width: 220px;
            display: none;
            z-index: 100;
        }
        .settings-dropdown.show { display: block; }
        .settings-item { padding: 14px 18px; display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .settings-item:hover { background: #f5f7fa; }

        /* 教师左侧工具列表 */
        .main-layout { display: flex; flex: 1; overflow: hidden; }
        .tool-sidebar {
            width: 260px;
            background: white;
            border-right: 1px solid #e8ecf1;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .tool-sidebar-header { padding: 20px; border-bottom: 1px solid #f0f4f9; }
        .tool-sidebar-header h3 { color: #2c3e4e; margin-bottom: 12px; font-size: 16px; }
        .search-box {
            width: 100%;
            padding: 10px 16px;
            border: 1px solid #e0e6ed;
            border-radius: 30px;
            font-size: 14px;
            background: #f8fafc;
        }
        .tools-list { flex: 1; overflow-y: auto; padding: 12px; }
        .tool-item {
            padding: 10px 14px;
            margin: 5px 0;
            background: #f8fafc;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .tool-item:hover { background: #eef2ff; }
        .tool-item.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .tool-name { font-size: 14px; font-weight: 500; flex: 1; }

        /* 右侧内容区 */
        .content-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #f8fafc; }
        .tool-header {
            background: white;
            padding: 12px 24px;
            border-bottom: 1px solid #eef2f7;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .current-tool span { color: #667eea; font-weight: 700; }
        .iframe-wrapper { flex: 1; background: white; }
        .tool-iframe { width: 100%; height: 100%; border: none; }

        /* ========== 管理员应用 - 左侧紧凑，右侧大预览 ========== */
        .admin-app {
            display: none;
            width: 100%;
            height: 100vh;
            background: #f0f2f8;
            flex-direction: column;
        }
        .admin-top-bar {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 10px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }
        .admin-logo { font-size: 16px; font-weight: 700; }
        .admin-user-info { display: flex; align-items: center; gap: 15px; position: relative; }
        .admin-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #f5c542;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
        }
        .admin-badge { background: #f5c542; color: #1a1a2e; padding: 3px 10px; border-radius: 30px; font-size: 11px; font-weight: 600; }
        .admin-logout-btn { background: rgba(255,255,255,0.15); border: none; padding: 6px 16px; border-radius: 30px; color: white; cursor: pointer; font-size: 13px; }
        .settings-dropdown.admin-dropdown { top: 50px; }

        /* 管理员主布局 - 左侧菜单更紧凑 */
        .admin-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .admin-sidebar {
            width: 180px;
            background: white;
            border-right: 1px solid #e8ecf1;
            flex-shrink: 0;
        }
        .admin-menu-item {
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.2s;
            border-left: 3px solid transparent;
            font-weight: 500;
            font-size: 14px;
        }
        .admin-menu-item:hover { background: #f5f7fa; }
        .admin-menu-item.active {
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
            border-left-color: #667eea;
            color: #667eea;
        }

        /* 右侧预览区更大 */
        .admin-main {
            flex: 1;
            display: flex;
            overflow: hidden;
            gap: 1px;
            background: #e8ecf1;
        }
        .admin-panel {
            width: 38%;
            background: white;
            overflow: auto;
            padding: 16px;
            flex-shrink: 0;
        }
        .admin-preview {
            flex: 1;
            background: white;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .preview-header {
            padding: 12px 16px;
            background: #f8fafc;
            border-bottom: 1px solid #eef2f7;
            font-weight: 600;
            font-size: 14px;
            color: #2c3e4e;
        }
        .preview-header span { color: #667eea; }
        .preview-iframe {
            flex: 1;
            width: 100%;
            border: none;
            background: white;
        }

        /* 紧凑的表格样式 */
        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
        .panel-title { font-size: 16px; font-weight: 600; color: #2c3e4e; }
        .btn {
            padding: 5px 12px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
            font-size: 12px;
        }
        .btn-primary { background: #667eea; color: white; }
        .btn-warning { background: #f5c542; color: #2c3e4e; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-sm { padding: 3px 10px; font-size: 11px; }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .data-table th, .data-table td {
            padding: 8px 10px;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
        }
        .data-table th { background: #f8fafc; font-weight: 600; }

        /* 模态框 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .modal.show { visibility: visible; opacity: 1; }
        .modal-content {
            background: white;
            border-radius: 28px;
            width: 90%;
            max-width: 550px;
            padding: 24px;
        }
        .modal-content h3 { margin-bottom: 16px; font-size: 18px; }
        .modal-input {
            width: 100%;
            padding: 10px 14px;
            margin: 8px 0;
            border: 1px solid #e0e6ed;
            border-radius: 30px;
            font-size: 14px;
        }
        .modal-textarea {
            width: 100%;
            height: 280px;
            padding: 12px;
            font-family: monospace;
            border: 1px solid #e0e6ed;
            border-radius: 16px;
            margin: 8px 0;
        }
        .modal-buttons { display: flex; gap: 12px; justify-content: flex-end; margin-top: 16px; }
        .avatar-select { display: flex; gap: 10px; flex-wrap: wrap; margin: 12px 0; }
        .avatar-option {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #f5f7fa;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            cursor: pointer;
        }
        .avatar-option.selected { border: 3px solid #667eea; background: #eef2ff; }
        .empty-tools { text-align: center; padding: 30px; color: #999; font-size: 13px; }
    </style>
</head>
<body>
    <!-- 登录页面 -->
    <div class="login-container" id="loginContainer">
        <div class="login-decoration">
            <div class="decoration-circle circle1"></div>
            <div class="decoration-circle circle2"></div>
            <div class="decoration-circle circle3"></div>
            <div class="decoration-circle circle4"></div>
        </div>
        <div class="login-card">
            <div class="login-logo">🎓✨</div>
            <div class="login-title">开智教育</div>
            <div class="login-subtitle">智慧教学 · 启迪未来</div>
            <input type="text" class="login-input" id="loginUsername" placeholder="📱 手机号 / 账号">
            <input type="password" class="login-input" id="loginPassword" placeholder="🔒 密码">
            <button class="login-btn" id="loginBtn">登 录 平 台</button>
            <div class="login-footer">🎯 教师专属教学工具 | 轻松管理课堂</div>
            <div class="login-error" id="loginError">账号或密码错误</div>
        </div>
    </div>

    <!-- 教师视图 -->
    <div class="teacher-app" id="teacherApp">
        <div class="top-bar">
            <div class="logo-area">🎓 开智<span>教育</span></div>
            <div class="user-info">
                <div class="avatar" id="avatarBtn">👤</div>
                <span class="user-name" id="teacherName">教师</span>
                <button class="logout-btn" id="teacherLogoutBtn">退出</button>
                <div class="settings-dropdown" id="settingsDropdown">
                    <div class="settings-item" id="editProfileBtn">✏️ 修改个人信息</div>
                    <div class="settings-item" id="changePasswordBtn">🔐 修改密码</div>
                </div>
            </div>
        </div>
        <div class="main-layout">
            <div class="tool-sidebar">
                <div class="tool-sidebar-header">
                    <h3>📚 教学工具</h3>
                    <input type="text" class="search-box" id="teacherSearch" placeholder="🔍 搜索工具...">
                </div>
                <div class="tools-list" id="teacherToolsList"><div class="empty-tools">✨ 暂无工具</div></div>
            </div>
            <div class="content-area">
                <div class="tool-header">
                    <div class="current-tool">📖 当前工具：<span id="currentToolName">未选择</span></div>
                    <button class="refresh-btn" id="refreshToolBtn" style="background:#f0f4f9; border:none; padding:5px 15px; border-radius:20px;">🔄 刷新</button>
                </div>
                <div class="iframe-wrapper"><iframe id="teacherIframe" class="tool-iframe" srcdoc=""></iframe></div>
            </div>
        </div>
    </div>

    <!-- 管理员视图 -->
    <div class="admin-app" id="adminApp">
        <div class="admin-top-bar">
            <div class="admin-logo">🎓 开智教育 · 管理平台</div>
            <div class="admin-user-info">
                <div class="admin-avatar" id="adminAvatarBtn">👑</div>
                <span id="adminName">管理员</span>
                <span class="admin-badge">管理员</span>
                <button class="admin-logout-btn" id="adminLogoutBtn">退出</button>
                <div class="settings-dropdown admin-dropdown" id="adminSettingsDropdown">
                    <div class="settings-item" id="adminEditProfileBtn">✏️ 修改个人信息</div>
                    <div class="settings-item" id="adminChangePasswordBtn">🔐 修改密码</div>
                </div>
            </div>
        </div>
        <div class="admin-layout">
            <!-- 左侧紧凑菜单 -->
            <div class="admin-sidebar">
                <div class="admin-menu-item active" data-admin-menu="users">👥 用户管理</div>
                <div class="admin-menu-item" data-admin-menu="tools">🧩 工具管理</div>
            </div>
            <!-- 右侧大预览区 -->
            <div class="admin-main">
                <!-- 左侧面板（管理列表） -->
                <div class="admin-panel" id="adminUsersPanel">
                    <div class="panel-header">
                        <div class="panel-title">👥 用户管理</div>
                        <div><button class="btn btn-primary" id="addUserBtn">➕ 添加</button><button class="btn btn-warning" id="batchImportBtn" style="margin-left:5px;">📂 批量</button></div>
                    </div>
                    <table class="data-table">
                        <thead><tr><th>姓名</th><th>手机号</th><th>角色</th><th>头像</th><th>操作</th></tr></thead>
                        <tbody id="adminUserTableBody"></tbody>
                    </table>
                </div>
                <div class="admin-panel" id="adminToolsPanel" style="display:none;">
                    <div class="panel-header">
                        <div class="panel-title">🧩 工具管理</div>
                        <button class="btn btn-primary" id="adminAddToolBtn">➕ 添加工具</button>
                    </div>
                    <table class="data-table">
                        <thead><tr><th>名称</th><th>预览</th><th>操作</th></tr></thead>
                        <tbody id="adminToolTableBody"></tbody>
                    </table>
                </div>
                <!-- 右侧大预览区域 -->
                <div class="admin-preview">
                    <div class="preview-header">
                        🖥️ 工具预览 <span id="previewToolName" style="color:#667eea;"></span>
                    </div>
                    <iframe id="adminPreviewIframe" class="preview-iframe" srcdoc="<div style='display:flex;align-items:center;justify-content:center;height:100%;color:#999;font-family:sans-serif;'>✨ 点击左侧工具列表中的「预览」按钮，查看效果</div>"></iframe>
                </div>
            </div>
        </div>
    </div>

    <!-- 模态框 -->
    <div class="modal" id="profileModal">
        <div class="modal-content">
            <h3>✏️ 修改个人信息</h3>
            <input type="text" id="profileName" class="modal-input" placeholder="姓名">
            <input type="text" id="profilePhone" class="modal-input" placeholder="手机号">
            <div style="margin: 10px 0; font-size: 13px; color: #666;">🎨 选择头像</div>
            <div class="avatar-select" id="avatarSelect">
                <div class="avatar-option" data-avatar="👤">👤</div><div class="avatar-option" data-avatar="👨">👨</div>
                <div class="avatar-option" data-avatar="👩">👩</div><div class="avatar-option" data-avatar="🧑">🧑</div>
                <div class="avatar-option" data-avatar="👨‍🏫">👨‍🏫</div><div class="avatar-option" data-avatar="👩‍🏫">👩‍🏫</div>
                <div class="avatar-option" data-avatar="🐱">🐱</div><div class="avatar-option" data-avatar="🐶">🐶</div>
                <div class="avatar-option" data-avatar="🦊">🦊</div><div class="avatar-option" data-avatar="🐼">🐼</div>
            </div>
            <div class="modal-buttons"><button class="btn" id="cancelProfileModal">取消</button><button class="btn btn-primary" id="confirmProfileModal">保存</button></div>
        </div>
    </div>

    <div class="modal" id="passwordModal">
        <div class="modal-content">
            <h3>🔐 修改密码</h3>
            <input type="password" id="oldPassword" class="modal-input" placeholder="当前密码">
            <input type="password" id="newPassword" class="modal-input" placeholder="新密码">
            <input type="password" id="confirmPassword" class="modal-input" placeholder="确认新密码">
            <div class="modal-buttons"><button class="btn" id="cancelPasswordModal">取消</button><button class="btn btn-primary" id="confirmPasswordModal">确认修改</button></div>
        </div>
    </div>

    <div class="modal" id="toolModal">
        <div class="modal-content" style="max-width: 700px;">
            <h3 id="toolModalTitle">➕ 添加工具</h3>
            <input type="text" id="toolName" class="modal-input" placeholder="工具名称">
            <textarea id="toolHtml" class="modal-textarea" placeholder="粘贴完整的HTML代码..."></textarea>
            <div class="modal-buttons"><button class="btn" id="cancelToolModal">取消</button><button class="btn btn-primary" id="confirmToolModal">确认</button></div>
        </div>
    </div>

    <script>
        // 数据初始化
        let users = [], tools = [], currentUser = null, nextUserId = 3, nextToolId = 1, editingToolId = null;

        function initData() {
            const savedUsers = localStorage.getItem('edu_users');
            if (savedUsers) { users = JSON.parse(savedUsers); nextUserId = Math.max(...users.map(u => u.id)) + 1; }
            else { users = [{ id: 1, name: '管理员', phone: 'admin', password: 'admin123', role: 'admin', avatar: '👑' }, { id: 2, name: '张老师', phone: '13800138000', password: '123456', role: 'teacher', avatar: '👨‍🏫' }]; nextUserId = 3; saveUsers(); }
            const savedTools = localStorage.getItem('edu_tools');
            if (savedTools) { const d = JSON.parse(savedTools); tools = d.tools; nextToolId = d.nextToolId; }
            else { tools = [{ id: nextToolId++, name: '📝 欢迎工具', html: '<div style="text-align:center;padding:80px;"><h1>🎉 欢迎使用开智教育</h1><p>在工具管理中添加您的HTML工具</p></div>' }, { id: nextToolId++, name: '✨ 示例工具', html: '<div style="text-align:center;padding:80px;"><h2>✨ 示例工具</h2><button onclick="alert(\'Hello!\')" style="margin-top:30px;padding:10px 30px;background:#667eea;color:white;border:none;border-radius:30px;">点击测试</button></div>' }]; saveTools(); }
        }
        function saveUsers() { localStorage.setItem('edu_users', JSON.stringify(users)); }
        function saveTools() { localStorage.setItem('edu_tools', JSON.stringify({ tools, nextToolId })); }
        function login(account, password) { const user = users.find(u => (u.phone === account || u.name === account) && u.password === password); if (user) { currentUser = user; return true; } return false; }

        // 教师视图
        let teacherCurrentToolId = null, teacherSearchKeyword = '';
        function renderTeacherTools() {
            const container = document.getElementById('teacherToolsList');
            let filtered = tools.filter(t => t.name.toLowerCase().includes(teacherSearchKeyword.toLowerCase()));
            if (!filtered.length) { container.innerHTML = '<div class="empty-tools">🔍 没有找到工具</div>'; return; }
            container.innerHTML = '';
            filtered.forEach(tool => {
                const div = document.createElement('div');
                div.className = 'tool-item' + (teacherCurrentToolId === tool.id ? ' active' : '');
                div.innerHTML = `<div class="tool-name">${escapeHtml(tool.name)}</div>`;
                div.onclick = () => { teacherCurrentToolId = tool.id; renderTeacherTools(); document.getElementById('currentToolName').innerText = tool.name; document.getElementById('teacherIframe').srcdoc = tool.html; };
                container.appendChild(div);
            });
        }
        function updateTeacherUI() {
            document.getElementById('teacherName').innerText = currentUser.name;
            document.getElementById('avatarBtn').innerHTML = currentUser.avatar || '👤';
            renderTeacherTools();
            if (tools.length && !teacherCurrentToolId) { teacherCurrentToolId = tools[0].id; renderTeacherTools(); document.getElementById('currentToolName').innerText = tools[0].name; document.getElementById('teacherIframe').srcdoc = tools[0].html; }
        }

        // 管理员视图
        let adminCurrentMenu = 'users', adminPreviewToolId = null;
        function renderAdminUsers() {
            const tbody = document.getElementById('adminUserTableBody');
            tbody.innerHTML = '';
            users.forEach(user => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${escapeHtml(user.name)}</td><td>${escapeHtml(user.phone)}</td><td>${user.role === 'admin' ? '👑 管理员' : '👨‍🏫 教师'}</td><td>${user.avatar || '👤'}</td><td><button class="btn btn-sm" style="background:#667eea;color:white;" onclick="adminEditUser(${user.id})">编辑</button><button class="btn btn-sm" style="background:#e74c3c;color:white;margin-left:5px;" onclick="adminDeleteUser(${user.id})">删除</button></td>`;
                tbody.appendChild(tr);
            });
        }
        function renderAdminTools() {
            const tbody = document.getElementById('adminToolTableBody');
            tbody.innerHTML = '';
            tools.forEach(tool => {
                const preview = tool.html.substring(0, 35).replace(/\n/g, ' ') + (tool.html.length > 35 ? '...' : '');
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${escapeHtml(tool.name)}</td><td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#999;">${escapeHtml(preview)}</td><td><button class="btn btn-sm" style="background:#f5c542;" onclick="adminEditTool(${tool.id})">编辑</button><button class="btn btn-sm" style="background:#667eea;color:white;margin-left:5px;" onclick="adminPreviewTool(${tool.id})">预览</button><button class="btn btn-sm" style="background:#e74c3c;color:white;margin-left:5px;" onclick="adminDeleteTool(${tool.id})">删除</button></td>`;
                tbody.appendChild(tr);
            });
        }
        window.adminPreviewTool = function(id) {
            const tool = tools.find(t => t.id === id);
            if (tool) { adminPreviewToolId = id; document.getElementById('previewToolName').innerText = tool.name; document.getElementById('adminPreviewIframe').srcdoc = tool.html; }
        };
        function switchAdminMenu(menu) {
            adminCurrentMenu = menu;
            document.getElementById('adminUsersPanel').style.display = menu === 'users' ? 'block' : 'none';
            document.getElementById('adminToolsPanel').style.display = menu === 'tools' ? 'block' : 'none';
            document.querySelectorAll('.admin-menu-item').forEach(item => item.classList.toggle('active', item.getAttribute('data-admin-menu') === menu));
            if (menu === 'users') renderAdminUsers();
            if (menu === 'tools') renderAdminTools();
        }

        // 用户操作
        function addUser(name, phone, password, role = 'teacher') {
            if (!password) password = '123456';
            if (users.some(u => u.phone === phone)) { alert('手机号已存在'); return false; }
            users.push({ id: nextUserId++, name, phone, password, role, avatar: '👤' });
            saveUsers(); if (adminCurrentMenu === 'users') renderAdminUsers(); return true;
        }
        function updateUser(id, name, phone, avatar) {
            const idx = users.findIndex(u => u.id === id);
            if (idx !== -1) {
                if (name) users[idx].name = name;
                if (phone) users[idx].phone = phone;
                if (avatar) users[idx].avatar = avatar;
                saveUsers(); if (adminCurrentMenu === 'users') renderAdminUsers();
                if (currentUser && currentUser.id === id) { currentUser = users[idx]; if (currentUser.role === 'teacher') updateTeacherUI(); }
            }
        }
        function updatePassword(id, oldPwd, newPwd) {
            const user = users.find(u => u.id === id);
            if (!user) return false;
            if (user.password !== oldPwd) { alert('当前密码错误'); return false; }
            user.password = newPwd; saveUsers(); return true;
        }
        function deleteUser(id) {
            if (users.filter(u => u.role === 'admin').length <= 1 && users.find(u => u.id === id)?.role === 'admin') { alert('至少保留一个管理员'); return false; }
            users = users.filter(u => u.id !== id); saveUsers(); if (adminCurrentMenu === 'users') renderAdminUsers(); return true;
        }
        function batchImportUsers(dataStr, defaultPwd) {
            let success = 0;
            dataStr.trim().split('\n').forEach(line => {
                line = line.trim(); if (!line) return;
                let parts = line.split(',');
                if (parts.length >= 2) { let name = parts[0].trim(), phone = parts[1].trim();
                    if (name && phone && !users.some(u => u.phone === phone)) { users.push({ id: nextUserId++, name, phone, password: defaultPwd, role: 'teacher', avatar: '👤' }); success++; } }
            });
            saveUsers(); if (adminCurrentMenu === 'users') renderAdminUsers(); return success;
        }

        // 工具操作
        function addTool(name, html) { if (!name.trim()) name = `工具 ${tools.length + 1}`; tools.push({ id: nextToolId++, name: name.trim(), html: html }); saveTools(); if (adminCurrentMenu === 'tools') renderAdminTools(); if (currentUser?.role === 'teacher') renderTeacherTools(); }
        function updateTool(id, name, html) {
            const idx = tools.findIndex(t => t.id === id);
            if (idx !== -1) {
                if (name) tools[idx].name = name.trim();
                if (html) tools[idx].html = html;
                saveTools(); if (adminCurrentMenu === 'tools') renderAdminTools();
                if (currentUser?.role === 'teacher') { renderTeacherTools(); if (teacherCurrentToolId === id) document.getElementById('teacherIframe').srcdoc = html; }
                if (adminPreviewToolId === id) document.getElementById('adminPreviewIframe').srcdoc = html;
            }
        }
        function deleteTool(id) { tools = tools.filter(t => t.id !== id); saveTools(); if (adminCurrentMenu === 'tools') renderAdminTools(); if (currentUser?.role === 'teacher') { if (teacherCurrentToolId === id && tools.length) { teacherCurrentToolId = tools[0].id; document.getElementById('teacherIframe').srcdoc = tools[0].html; document.getElementById('currentToolName').innerText = tools[0].name; } renderTeacherTools(); } }

        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }

        // 页面切换
        function showTeacherApp() { document.getElementById('loginContainer').style.display = 'none'; document.getElementById('teacherApp').style.display = 'flex'; document.getElementById('adminApp').style.display = 'none'; updateTeacherUI(); }
        function showAdminApp() { document.getElementById('loginContainer').style.display = 'none'; document.getElementById('teacherApp').style.display = 'none'; document.getElementById('adminApp').style.display = 'flex'; document.getElementById('adminName').innerText = currentUser.name; document.getElementById('adminAvatarBtn').innerHTML = currentUser.avatar || '👑'; switchAdminMenu('users'); }
        function logout() { currentUser = null; document.getElementById('loginContainer').style.display = 'flex'; document.getElementById('teacherApp').style.display = 'none'; document.getElementById('adminApp').style.display = 'none'; document.getElementById('loginUsername').value = ''; document.getElementById('loginPassword').value = ''; }

        // 事件绑定
        document.getElementById('loginBtn').onclick = () => { const u = document.getElementById('loginUsername').value, p = document.getElementById('loginPassword').value; if (login(u, p)) { if (currentUser.role === 'admin') showAdminApp(); else showTeacherApp(); } else { document.getElementById('loginError').style.display = 'block'; } };
        document.getElementById('loginPassword').onkeypress = e => { if (e.key === 'Enter') document.getElementById('loginBtn').click(); };
        document.getElementById('teacherLogoutBtn').onclick = logout; document.getElementById('adminLogoutBtn').onclick = logout;
        document.getElementById('refreshToolBtn').onclick = () => { if (teacherCurrentToolId) { const t = tools.find(t => t.id === teacherCurrentToolId); if (t) document.getElementById('teacherIframe').srcdoc = t.html; } };
        document.getElementById('teacherSearch').oninput = e => { teacherSearchKeyword = e.target.value; renderTeacherTools(); };
        document.getElementById('avatarBtn').onclick = e => { e.stopPropagation(); document.getElementById('settingsDropdown').classList.toggle('show'); };
        document.getElementById('adminAvatarBtn').onclick = e => { e.stopPropagation(); document.getElementById('adminSettingsDropdown').classList.toggle('show'); };
        document.addEventListener('click', () => { document.getElementById('settingsDropdown')?.classList.remove('show'); document.getElementById('adminSettingsDropdown')?.classList.remove('show'); });

        // 个人信息
        function openProfileModal() {
            document.getElementById('profileName').value = currentUser.name;
            document.getElementById('profilePhone').value = currentUser.phone;
            document.getElementById('profileModal').removeAttribute('data-user-id');
            document.getElementById('profileModal').classList.add('show');
            document.querySelectorAll('.avatar-option').forEach(opt => opt.classList.toggle('selected', opt.getAttribute('data-avatar') === currentUser.avatar));
        }
        document.getElementById('editProfileBtn')?.addEventListener('click', openProfileModal);
        document.getElementById('adminEditProfileBtn')?.addEventListener('click', openProfileModal);
        document.querySelectorAll('.avatar-option').forEach(opt => { opt.onclick = () => { document.querySelectorAll('.avatar-option').forEach(o => o.classList.remove('selected')); opt.classList.add('selected'); }; });
        document.getElementById('confirmProfileModal').onclick = () => {
            const name = document.getElementById('profileName').value, phone = document.getElementById('profilePhone').value, avatar = document.querySelector('.avatar-option.selected')?.getAttribute('data-avatar') || '👤';
            if (!name || !phone) { alert('请填写完整信息'); return; }
            const userId = document.getElementById('profileModal').getAttribute('data-user-id');
            if (userId) updateUser(parseInt(userId), name, phone, avatar);
            else updateUser(currentUser.id, name, phone, avatar);
            document.getElementById('profileModal').classList.remove('show');
            if (currentUser.role === 'teacher') updateTeacherUI(); else document.getElementById('adminName').innerText = name;
        };
        function openPasswordModal() { document.getElementById('oldPassword').value = ''; document.getElementById('newPassword').value = ''; document.getElementById('confirmPassword').value = ''; document.getElementById('passwordModal').classList.add('show'); }
        document.getElementById('changePasswordBtn')?.addEventListener('click', openPasswordModal);
        document.getElementById('adminChangePasswordBtn')?.addEventListener('click', openPasswordModal);
        document.getElementById('confirmPasswordModal').onclick = () => {
            const oldPwd = document.getElementById('oldPassword').value, newPwd = document.getElementById('newPassword').value, confirmPwd = document.getElementById('confirmPassword').value;
            if (!oldPwd || !newPwd) { alert('请填写完整'); return; }
            if (newPwd !== confirmPwd) { alert('两次新密码不一致'); return; }
            if (updatePassword(currentUser.id, oldPwd, newPwd)) { alert('密码修改成功，请重新登录'); logout(); }
            document.getElementById('passwordModal').classList.remove('show');
        };
        document.getElementById('cancelProfileModal').onclick = () => document.getElementById('profileModal').classList.remove('show');
        document.getElementById('cancelPasswordModal').onclick = () => document.getElementById('passwordModal').classList.remove('show');
        document.getElementById('cancelToolModal').onclick = () => document.getElementById('toolModal').classList.remove('show');
        document.getElementById('confirmToolModal').onclick = () => {
            const name = document.getElementById('toolName').value, html = document.getElementById('toolHtml').value;
            if (!html.trim()) { alert('请输入HTML代码'); return; }
            if (editingToolId) updateTool(editingToolId, name, html);
            else addTool(name, html);
            document.getElementById('toolModal').classList.remove('show'); editingToolId = null;
        };
        document.querySelectorAll('.admin-menu-item').forEach(el => { el.onclick = () => switchAdminMenu(el.getAttribute('data-admin-menu')); });
        document.getElementById('addUserBtn').onclick = () => {
            document.getElementById('profileName').value = ''; document.getElementById('profilePhone').value = '';
            document.getElementById('profileModal').removeAttribute('data-user-id');
            document.getElementById('profileModal').classList.add('show');
            document.querySelectorAll('.avatar-option').forEach(opt => opt.classList.remove('selected'));
            document.querySelector('.avatar-option[data-avatar="👤"]')?.classList.add('selected');
            const oldConfirm = document.getElementById('confirmProfileModal').onclick;
            document.getElementById('confirmProfileModal').onclick = () => {
                const name = document.getElementById('profileName').value, phone = document.getElementById('profilePhone').value, avatar = document.querySelector('.avatar-option.selected')?.getAttribute('data-avatar') || '👤';
                if (!name || !phone) { alert('请填写完整'); return; }
                addUser(name, phone, '123456', 'teacher');
                document.getElementById('profileModal').classList.remove('show');
                document.getElementById('confirmProfileModal').onclick = oldConfirm;
            };
        };
        document.getElementById('adminAddToolBtn').onclick = () => { editingToolId = null; document.getElementById('toolModalTitle').innerText = '➕ 添加工具'; document.getElementById('toolName').value = ''; document.getElementById('toolHtml').value = ''; document.getElementById('toolModal').classList.add('show'); };
        window.adminEditUser = function(id) { const user = users.find(u => u.id === id); if (!user) return; document.getElementById('profileName').value = user.name; document.getElementById('profilePhone').value = user.phone; document.getElementById('profileModal').setAttribute('data-user-id', id); document.getElementById('profileModal').classList.add('show'); document.querySelectorAll('.avatar-option').forEach(opt => opt.classList.toggle('selected', opt.getAttribute('data-avatar') === user.avatar)); };
        window.adminDeleteUser = function(id) { if (confirm('确定删除吗？')) deleteUser(id); };
        window.adminEditTool = function(id) { const tool = tools.find(t => t.id === id); if (!tool) return; editingToolId = id; document.getElementById('toolModalTitle').innerText = '✏️ 编辑工具'; document.getElementById('toolName').value = tool.name; document.getElementById('toolHtml').value = tool.html; document.getElementById('toolModal').classList.add('show'); };
        window.adminDeleteTool = function(id) { if (confirm('确定删除吗？')) deleteTool(id); };
        function showBatchModal() {
            const m = document.createElement('div'); m.className = 'modal show';
            m.innerHTML = `<div class="modal-content" style="max-width:500px;"><h3>📂 批量导入用户</h3><p style="color:#666;">格式：姓名,手机号（一行一个）</p><textarea id="batchData" style="width:100%;height:150px;padding:12px;border-radius:16px;border:1px solid #ddd;"></textarea><div style="margin:12px 0;"><label>默认密码：</label><input type="text" id="defaultPassword" value="123456" style="padding:8px;border-radius:30px;border:1px solid #ddd;"></div><div class="modal-buttons"><button class="btn" id="cancelBatch">取消</button><button class="btn btn-primary" id="confirmBatch">确认导入</button></div></div>`;
            document.body.appendChild(m);
            document.getElementById('cancelBatch').onclick = () => m.remove();
            document.getElementById('confirmBatch').onclick = () => {
                const data = document.getElementById('batchData').value, pwd = document.getElementById('defaultPassword').value;
                if (data.trim()) { const c = batchImportUsers(data, pwd); alert(`成功导入 ${c} 个用户`); m.remove(); }
                else alert('请填写数据');
            };
        }
        document.getElementById('batchImportBtn').onclick = showBatchModal;

        initData();
        document.getElementById('loginContainer').style.display = 'flex';
    </script>
</body>
</html>
