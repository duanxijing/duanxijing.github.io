<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>开智教育 · 云端教学平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; overflow: hidden; }
        
        .login-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .login-card {
            background: rgba(255,255,255,0.98); border-radius: 56px; padding: 48px 44px;
            width: 440px; text-align: center; box-shadow: 0 40px 60px -20px rgba(0,0,0,0.3);
            animation: fadeInUp 0.6s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-logo { font-size: 72px; margin-bottom: 12px; }
        .login-title { font-size: 32px; font-weight: 800; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 8px; }
        .login-subtitle { color: #8a9aaa; margin-bottom: 32px; font-size: 14px; }
        .login-input {
            width: 100%; padding: 14px 20px; margin: 10px 0;
            border: 2px solid #e8e8e8; border-radius: 50px; font-size: 15px;
            background: #f8f9fa;
        }
        .login-input:focus { outline: none; border-color: #667eea; background: white; }
        .login-btn {
            width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; border-radius: 50px; font-size: 16px;
            font-weight: 700; cursor: pointer; margin-top: 24px;
        }
        .login-footer { margin-top: 24px; color: #aaa; font-size: 12px; }
        .login-error { color: #e74c3c; font-size: 13px; margin-top: 12px; display: none; }

        .teacher-app, .admin-app {
            display: none;
            width: 100%;
            height: 100vh;
            background: #f0f2f8;
            flex-direction: column;
        }
        .top-bar {
            background: white; padding: 12px 28px; display: flex;
            justify-content: space-between; align-items: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
        }
        .logo-area { font-size: 20px; font-weight: 800; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .user-info { display: flex; align-items: center; gap: 18px; position: relative; }
        .avatar {
            width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex; align-items: center; justify-content: center; font-size: 26px;
            cursor: pointer; color: white;
        }
        .logout-btn { background: #f0f0f0; border: none; padding: 8px 20px; border-radius: 30px; cursor: pointer; }
        .settings-dropdown {
            position: absolute; top: 60px; right: 0; background: white;
            border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            width: 220px; display: none; z-index: 100;
        }
        .settings-dropdown.show { display: block; }
        .settings-item { padding: 12px 18px; cursor: pointer; }
        .settings-item:hover { background: #f5f7fa; }
        
        .main-layout { display: flex; flex: 1; overflow: hidden; }
        .tool-sidebar {
            width: 260px; background: white; border-right: 1px solid #e8ecf1;
            display: flex; flex-direction: column;
        }
        .tool-sidebar-header { padding: 20px; border-bottom: 1px solid #f0f4f9; }
        .tool-sidebar-header h3 { margin-bottom: 12px; font-size: 16px; color: #2c3e4e; }
        .search-box {
            width: 100%; padding: 10px 16px; border: 1px solid #e0e6ed;
            border-radius: 30px; font-size: 14px; background: #f8fafc;
        }
        .tools-list { flex: 1; overflow-y: auto; padding: 12px; }
        .tool-item {
            padding: 10px 14px; margin: 5px 0; background: #f8fafc;
            border-radius: 12px; cursor: pointer; transition: all 0.2s;
        }
        .tool-item:hover { background: #eef2ff; transform: translateX(3px); }
        .tool-item.active { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .content-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #f8fafc; }
        .tool-header {
            background: white; padding: 12px 24px; border-bottom: 1px solid #eef2f7;
            display: flex; justify-content: space-between;
        }
        .current-tool span { color: #667eea; font-weight: 700; }
        .iframe-wrapper { flex: 1; background: white; }
        .tool-iframe { width: 100%; height: 100%; border: none; }
        .empty-tools { text-align: center; padding: 40px; color: #999; }

        .admin-layout { display: flex; flex: 1; overflow: hidden; }
        .admin-sidebar {
            width: 180px; background: white; border-right: 1px solid #e8ecf1;
            flex-shrink: 0;
        }
        .admin-menu-item {
            padding: 14px 18px; display: flex; align-items: center; gap: 10px;
            cursor: pointer; transition: 0.2s; border-left: 3px solid transparent;
            font-weight: 500;
        }
        .admin-menu-item:hover { background: #f5f7fa; }
        .admin-menu-item.active {
            background: linear-gradient(135deg, #667eea15, #764ba215);
            border-left-color: #667eea; color: #667eea;
        }
        .admin-panel {
            flex: 1; overflow: auto; padding: 20px; background: white;
        }
        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .panel-title { font-size: 18px; font-weight: 600; color: #2c3e4e; }
        .btn {
            padding: 6px 14px; border: none; border-radius: 30px; cursor: pointer;
            font-weight: 500; font-size: 13px;
        }
        .btn-primary { background: #667eea; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-sm { padding: 4px 10px; font-size: 12px; }
        .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .data-table th, .data-table td {
            padding: 10px 12px; text-align: left; border-bottom: 1px solid #f0f0f0;
        }
        .data-table th { background: #f8fafc; font-weight: 600; }

        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 2000; display: flex;
            align-items: center; justify-content: center; visibility: hidden; opacity: 0;
            transition: 0.2s;
        }
        .modal.show { visibility: visible; opacity: 1; }
        .modal-content {
            background: white; border-radius: 28px; width: 90%; max-width: 650px;
            padding: 24px;
        }
        .modal-content h3 { margin-bottom: 16px; }
        .modal-input, .modal-textarea {
            width: 100%; padding: 10px 14px; margin: 8px 0;
            border: 1px solid #ddd; border-radius: 30px;
        }
        .modal-textarea { height: 300px; font-family: monospace; border-radius: 16px; }
        .modal-buttons { display: flex; gap: 12px; justify-content: flex-end; margin-top: 16px; }
        .loading { text-align: center; padding: 40px; color: #999; }
    </style>
</head>
<body>
    <div class="login-container" id="loginContainer">
        <div class="login-card">
            <div class="login-logo">🎓✨</div>
            <div class="login-title">开智教育</div>
            <div class="login-subtitle">云端教学 · 数据共享</div>
            <input type="text" class="login-input" id="loginUsername" placeholder="📱 手机号 / 账号">
            <input type="password" class="login-input" id="loginPassword" placeholder="🔒 密码">
            <button class="login-btn" id="loginBtn">登 录 平 台</button>
            <div class="login-footer">🎯 教师专属教学工具 | 轻松管理课堂</div>
            <div class="login-error" id="loginError">账号或密码错误</div>
        </div>
    </div>

    <div class="teacher-app" id="teacherApp">
        <div class="top-bar">
            <div class="logo-area">🎓 开智<span>教育</span></div>
            <div class="user-info">
                <div class="avatar" id="avatarBtn">👤</div>
                <span id="teacherName">教师</span>
                <button class="logout-btn" id="teacherLogoutBtn">退出</button>
                <div class="settings-dropdown" id="settingsDropdown">
                    <div class="settings-item" id="editProfileBtn">✏️ 修改信息</div>
                    <div class="settings-item" id="changePasswordBtn">🔐 修改密码</div>
                </div>
            </div>
        </div>
        <div class="main-layout">
            <div class="tool-sidebar">
                <div class="tool-sidebar-header">
                    <h3>📚 教学工具</h3>
                    <input type="text" class="search-box" id="teacherSearch" placeholder="🔍 搜索工具...">
                </div>
                <div class="tools-list" id="teacherToolsList"><div class="loading">加载中...</div></div>
            </div>
            <div class="content-area">
                <div class="tool-header">
                    <div class="current-tool">📖 当前工具：<span id="currentToolName">未选择</span></div>
                    <button id="refreshToolBtn" style="background:#f0f4f9; border:none; padding:5px 15px; border-radius:20px;">🔄 刷新</button>
                </div>
                <div class="iframe-wrapper"><iframe id="teacherIframe" class="tool-iframe" srcdoc="<div style='display:flex;align-items:center;justify-content:center;height:100%;color:#999;'>请从左侧选择一个工具</div>"></iframe></div>
            </div>
        </div>
    </div>

    <div class="admin-app" id="adminApp">
        <div class="top-bar">
            <div class="logo-area">🎓 开智教育 · 管理平台</div>
            <div class="user-info">
                <div class="avatar" id="adminAvatarBtn">👑</div>
                <span id="adminName">管理员</span>
                <button class="logout-btn" id="adminLogoutBtn">退出</button>
            </div>
        </div>
        <div class="admin-layout">
            <div class="admin-sidebar">
                <div class="admin-menu-item active" data-menu="users">👥 用户管理</div>
                <div class="admin-menu-item" data-menu="tools">🧩 工具管理</div>
            </div>
            <div class="admin-panel" id="usersPanel">
                <div class="panel-header"><div class="panel-title">👥 用户管理</div><button class="btn btn-primary" id="addUserBtn">➕ 添加用户</button></div>
                <div id="usersList"><div class="loading">加载中...</div></div>
            </div>
            <div class="admin-panel" id="toolsPanel" style="display:none;">
                <div class="panel-header"><div class="panel-title">🧩 工具管理</div><button class="btn btn-primary" id="addToolBtn">➕ 添加工具</button></div>
                <div id="toolsAdminList"><div class="loading">加载中...</div></div>
            </div>
        </div>
    </div>

    <div class="modal" id="toolModal">
        <div class="modal-content">
            <h3 id="toolModalTitle">➕ 添加工具</h3>
            <input type="text" id="toolName" class="modal-input" placeholder="工具名称">
            <textarea id="toolHtml" class="modal-textarea" placeholder="粘贴完整的HTML代码..."></textarea>
            <div class="modal-buttons"><button class="btn" id="cancelToolModal">取消</button><button class="btn btn-primary" id="confirmToolModal">确认</button></div>
        </div>
    </div>

    <div class="modal" id="profileModal">
        <div class="modal-content">
            <h3>✏️ 修改个人信息</h3>
            <input type="text" id="profileName" class="modal-input" placeholder="姓名">
            <input type="text" id="profilePhone" class="modal-input" placeholder="手机号">
            <div class="modal-buttons"><button class="btn" id="cancelProfileModal">取消</button><button class="btn btn-primary" id="confirmProfileModal">保存</button></div>
        </div>
    </div>

    <div class="modal" id="passwordModal">
        <div class="modal-content">
            <h3>🔐 修改密码</h3>
            <input type="password" id="oldPassword" class="modal-input" placeholder="当前密码">
            <input type="password" id="newPassword" class="modal-input" placeholder="新密码">
            <input type="password" id="confirmPassword" class="modal-input" placeholder="确认新密码">
            <div class="modal-buttons"><button class="btn" id="cancelPasswordModal">取消</button><button class="btn btn-primary" id="confirmPasswordModal">确认修改</button></div>
        </div>
    </div>

    <script>
        // ==================== 🔴 请替换为您的 Supabase 配置 ====================
        const SUPABASE_URL = 'https://YOUR_PROJECT.supabase.co';      // 替换为您的 Project URL
        const SUPABASE_KEY = 'YOUR_ANON_KEY';                         // 替换为您的 anon public key
        
        let currentUser = null;
        let currentToolId = null;
        let tools = [];
        let users = [];
        let searchKeyword = '';
        let editingToolId = null;

        async function supabaseRequest(table, method = 'GET', data = null, id = null) {
            let url = `${SUPABASE_URL}/rest/v1/${table}?select=*`;
            if (id) url = `${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`;
            const options = {
                method: method === 'GET' ? 'GET' : (id ? 'PATCH' : 'POST'),
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' }
            };
            if (data && (method === 'POST' || method === 'PATCH')) options.body = JSON.stringify(data);
            if (method === 'DELETE' && id) options.method = 'DELETE';
            try {
                const response = await fetch(url, options);
                if (method === 'GET') return await response.json();
                return response.ok;
            } catch(e) { return method === 'GET' ? [] : false; }
        }

        async function loadTools() {
            const data = await supabaseRequest('tools', 'GET');
            tools = data || [];
            if (currentUser?.role === 'teacher') renderTeacherTools();
            if (document.getElementById('toolsAdminList')) renderAdminTools();
        }

        async function loadUsers() {
            const data = await supabaseRequest('users', 'GET');
            users = data || [];
            if (document.getElementById('usersList')) renderAdminUsers();
        }

        async function login(account, password) {
            const data = await supabaseRequest('users', 'GET');
            const user = data.find(u => (u.phone === account || u.name === account) && u.password === password);
            if (user) { currentUser = user; return true; }
            return false;
        }

        function renderTeacherTools() {
            const container = document.getElementById('teacherToolsList');
            if (!container) return;
            let filtered = tools.filter(t => t.name.toLowerCase().includes(searchKeyword.toLowerCase()));
            if (filtered.length === 0) { container.innerHTML = '<div class="empty-tools">✨ 暂无工具</div>'; return; }
            container.innerHTML = '';
            filtered.forEach(tool => {
                const div = document.createElement('div');
                div.className = 'tool-item' + (currentToolId === tool.id ? ' active' : '');
                div.textContent = tool.name;
                div.onclick = () => {
                    currentToolId = tool.id;
                    renderTeacherTools();
                    document.getElementById('currentToolName').innerText = tool.name;
                    document.getElementById('teacherIframe').srcdoc = tool.html;
                };
                container.appendChild(div);
            });
        }

        function updateTeacherUI() {
            document.getElementById('teacherName').innerText = currentUser.name;
            document.getElementById('avatarBtn').innerHTML = currentUser.avatar || '👤';
            renderTeacherTools();
            if (tools.length > 0 && !currentToolId) {
                currentToolId = tools[0].id;
                renderTeacherTools();
                document.getElementById('currentToolName').innerText = tools[0].name;
                document.getElementById('teacherIframe').srcdoc = tools[0].html;
            }
        }

        function renderAdminUsers() {
            const container = document.getElementById('usersList');
            if (!container) return;
            if (users.length === 0) { container.innerHTML = '<div class="loading">暂无用户</div>'; return; }
            let html = '<table class="data-table"><thead><tr><th>姓名</th><th>手机号</th><th>角色</th><th>操作</th></tr></thead><tbody>';
            users.forEach(user => {
                if (user.id !== currentUser?.id) {
                    html += `<tr><td>${escapeHtml(user.name)}</td><td>${escapeHtml(user.phone)}</td><td>${user.role === 'admin' ? '👑 管理员' : '👨‍🏫 教师'}</td><td><button class="btn btn-sm btn-danger" onclick="deleteUserById(${user.id})">删除</button></td></tr>`;
                }
            });
            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function renderAdminTools() {
            const container = document.getElementById('toolsAdminList');
            if (!container) return;
            if (tools.length === 0) { container.innerHTML = '<div class="loading">暂无工具</div>'; return; }
            let html = '<table class="data-table"><thead><tr><th>名称</th><th>操作</th></tr></thead><tbody>';
            tools.forEach(tool => {
                html += `<tr><td>${escapeHtml(tool.name)}</td><td><button class="btn btn-sm" style="background:#f5c542;" onclick="editToolById(${tool.id})">编辑</button><button class="btn btn-sm btn-danger" onclick="deleteToolById(${tool.id})">删除</button></td></tr>`;
            });
            html += '</tbody></table>';
            container.innerHTML = html;
        }

        async function addTool(name, html) {
            await supabaseRequest('tools', 'POST', { name, html });
            await loadTools();
        }

        async function updateToolById(id, name, html) {
            await supabaseRequest('tools', 'PATCH', { name, html }, id);
            await loadTools();
            if (currentToolId === id) { const tool = tools.find(t => t.id === id); if (tool) document.getElementById('teacherIframe').srcdoc = tool.html; }
        }

        async function deleteToolById(id) {
            if (confirm('确定删除该工具吗？')) {
                await supabaseRequest('tools', 'DELETE', null, id);
                await loadTools();
                if (currentToolId === id && tools.length > 0) {
                    currentToolId = tools[0]?.id;
                    if (currentToolId) {
                        document.getElementById('currentToolName').innerText = tools[0].name;
                        document.getElementById('teacherIframe').srcdoc = tools[0].html;
                        renderTeacherTools();
                    }
                }
            }
        }

        async function addUser(name, phone, password) {
            await supabaseRequest('users', 'POST', { name, phone, password, role: 'teacher', avatar: '👤' });
            await loadUsers();
        }

        async function deleteUserById(id) {
            if (confirm('确定删除该用户吗？')) {
                await supabaseRequest('users', 'DELETE', null, id);
                await loadUsers();
            }
        }

        async function updateUserInfo(name, phone) {
            await supabaseRequest('users', 'PATCH', { name, phone }, currentUser.id);
            currentUser.name = name;
            currentUser.phone = phone;
            if (currentUser.role === 'teacher') document.getElementById('teacherName').innerText = name;
            else document.getElementById('adminName').innerText = name;
        }

        async function updateUserPassword(oldPwd, newPwd) {
            if (currentUser.password !== oldPwd) { alert('当前密码错误'); return false; }
            await supabaseRequest('users', 'PATCH', { password: newPwd }, currentUser.id);
            currentUser.password = newPwd;
            return true;
        }

        async function showTeacherApp() {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('teacherApp').style.display = 'flex';
            document.getElementById('adminApp').style.display = 'none';
            await loadTools();
            updateTeacherUI();
        }

        async function showAdminApp() {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('teacherApp').style.display = 'none';
            document.getElementById('adminApp').style.display = 'flex';
            document.getElementById('adminName').innerText = currentUser.name;
            document.getElementById('adminAvatarBtn').innerHTML = currentUser.avatar || '👑';
            await loadUsers();
            await loadTools();
        }

        function logout() {
            currentUser = null;
            document.getElementById('loginContainer').style.display = 'flex';
            document.getElementById('teacherApp').style.display = 'none';
            document.getElementById('adminApp').style.display = 'none';
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
        }

        function switchMenu(menu) {
            document.getElementById('usersPanel').style.display = menu === 'users' ? 'block' : 'none';
            document.getElementById('toolsPanel').style.display = menu === 'tools' ? 'block' : 'none';
            document.querySelectorAll('.admin-menu-item').forEach(item => {
                item.classList.toggle('active', item.getAttribute('data-menu') === menu);
            });
        }

        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }

        window.editToolById = function(id) {
            const tool = tools.find(t => t.id === id);
            if (tool) {
                editingToolId = id;
                document.getElementById('toolModalTitle').innerText = '✏️ 编辑工具';
                document.getElementById('toolName').value = tool.name;
                document.getElementById('toolHtml').value = tool.html;
                document.getElementById('toolModal').classList.add('show');
            }
        };
        window.deleteToolById = deleteToolById;
        window.deleteUserById = deleteUserById;

        document.getElementById('loginBtn').onclick = async () => {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            if (await login(username, password)) {
                if (currentUser.role === 'admin') showAdminApp();
                else showTeacherApp();
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        };
        document.getElementById('loginPassword').onkeypress = (e) => { if (e.key === 'Enter') document.getElementById('loginBtn').click(); };
        document.getElementById('teacherLogoutBtn').onclick = logout;
        document.getElementById('adminLogoutBtn').onclick = logout;
        document.getElementById('refreshToolBtn').onclick = () => { if (currentToolId) { const tool = tools.find(t => t.id === currentToolId); if (tool) document.getElementById('teacherIframe').srcdoc = tool.html; } };
        document.getElementById('teacherSearch').oninput = (e) => { searchKeyword = e.target.value; renderTeacherTools(); };
        document.getElementById('avatarBtn').onclick = (e) => { e.stopPropagation(); document.getElementById('settingsDropdown').classList.toggle('show'); };
        document.addEventListener('click', () => { document.getElementById('settingsDropdown')?.classList.remove('show'); });
        document.getElementById('editProfileBtn').onclick = () => { document.getElementById('profileName').value = currentUser.name; document.getElementById('profilePhone').value = currentUser.phone; document.getElementById('profileModal').classList.add('show'); };
        document.getElementById('cancelProfileModal').onclick = () => { document.getElementById('profileModal').classList.remove('show'); };
        document.getElementById('confirmProfileModal').onclick = async () => { const name = document.getElementById('profileName').value; const phone = document.getElementById('profilePhone').value; if (name && phone) { await updateUserInfo(name, phone); alert('修改成功'); document.getElementById('profileModal').classList.remove('show'); } };
        document.getElementById('changePasswordBtn').onclick = () => { document.getElementById('oldPassword').value = ''; document.getElementById('newPassword').value = ''; document.getElementById('confirmPassword').value = ''; document.getElementById('passwordModal').classList.add('show'); };
        document.getElementById('cancelPasswordModal').onclick = () => { document.getElementById('passwordModal').classList.remove('show'); };
        document.getElementById('confirmPasswordModal').onclick = async () => { const oldPwd = document.getElementById('oldPassword').value; const newPwd = document.getElementById('newPassword').value; const confirmPwd = document.getElementById('confirmPassword').value; if (!oldPwd || !newPwd) { alert('请填写完整'); return; } if (newPwd !== confirmPwd) { alert('两次密码不一致'); return; } if (await updateUserPassword(oldPwd, newPwd)) { alert('密码修改成功，请重新登录'); logout(); } document.getElementById('passwordModal').classList.remove('show'); };
        document.getElementById('addUserBtn').onclick = () => { const name = prompt('请输入姓名'); if (!name) return; const phone = prompt('请输入手机号'); if (!phone) return; addUser(name, phone, '123456'); alert('添加成功，默认密码：123456'); };
        document.getElementById('addToolBtn').onclick = () => { editingToolId = null; document.getElementById('toolModalTitle').innerText = '➕ 添加工具'; document.getElementById('toolName').value = ''; document.getElementById('toolHtml').value = ''; document.getElementById('toolModal').classList.add('show'); };
        document.getElementById('cancelToolModal').onclick = () => { document.getElementById('toolModal').classList.remove('show'); };
        document.getElementById('confirmToolModal').onclick = async () => { const name = document.getElementById('toolName').value; const html = document.getElementById('toolHtml').value; if (!html.trim()) { alert('请输入HTML代码'); return; } if (editingToolId) { await updateToolById(editingToolId, name, html); } else { await addTool(name, html); } document.getElementById('toolModal').classList.remove('show'); editingToolId = null; };
        document.querySelectorAll('.admin-menu-item').forEach(item => { item.onclick = () => switchMenu(item.getAttribute('data-menu')); });

        if (SUPABASE_URL === 'https://YOUR_PROJECT.supabase.co') {
            alert('⚠️ 请先配置 Supabase！\n\n1. 访问 supabase.com 注册\n2. 创建项目，获取 URL 和 anon key\n3. 替换代码中的 SUPABASE_URL 和 SUPABASE_KEY');
        }
    </script>
</body>
